<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galaxy Simulation</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: black;
        width: 100%;
        height: 100%;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    .info {
        position: absolute;
        top: 15px;
        left: 15px;
        color: white;
        opacity: 0.7;
        font-size: 14px;
        letter-spacing: 1px;
        user-select: none;
    }
</style>
</head>
<body>

<div class="info">
    Move mouse = bend galaxy<br>
    Click = supernova pulse
</div>

<canvas id="galaxy"></canvas>

<script>
const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

const center = {
    x: w / 2,
    y: h / 2
};

const stars = [];
const STAR_COUNT = 2500;

let mouse = {
    x: center.x,
    y: center.y
};

let pulse = 0;

window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;

    center.x = w / 2;
    center.y = h / 2;
});

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("click", () => {
    pulse = 80;
});

class Star {
    constructor() {
        this.reset();
    }

    reset() {
        this.radius = Math.random() * 350 + 20;
        this.angle = Math.random() * Math.PI * 2;
        this.size = Math.random() * 2;
        this.speed = 0.0005 + Math.random() * 0.002;
        this.offset = Math.random() * 50;
        this.color = `hsl(${200 + Math.random() * 80}, 100%, ${60 + Math.random() * 40}%)`;
    }

    update() {
        this.angle += this.speed;

        const swirl = this.radius * 0.35;

        const dx = mouse.x - center.x;
        const dy = mouse.y - center.y;

        const distortionX = dx * 0.00015 * this.radius;
        const distortionY = dy * 0.00015 * this.radius;

        this.x =
            center.x +
            Math.cos(this.angle + this.radius * 0.01) *
                (this.radius + swirl * Math.sin(this.angle * 2)) +
            distortionX;

        this.y =
            center.y +
            Math.sin(this.angle + this.radius * 0.01) *
                (this.radius + swirl * Math.cos(this.angle * 2)) +
            distortionY;
    }

    draw() {
        const glow = pulse > 0 ? pulse * 0.15 : 0;

        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 8 + glow;
        ctx.shadowColor = this.color;
        ctx.arc(this.x, this.y, this.size + glow * 0.02, 0, Math.PI * 2);
        ctx.fill();
    }
}

for (let i = 0; i < STAR_COUNT; i++) {
    stars.push(new Star());
}

function drawBackground() {
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.fillRect(0, 0, w, h);
}

function drawCore() {
    const gradient = ctx.createRadialGradient(
        center.x,
        center.y,
        0,
        center.x,
        center.y,
        120 + pulse
    );

    gradient.addColorStop(0, "rgba(255,255,255,1)");
    gradient.addColorStop(0.2, "rgba(180,220,255,0.9)");
    gradient.addColorStop(0.5, "rgba(100,150,255,0.25)");
    gradient.addColorStop(1, "rgba(0,0,0,0)");

    ctx.beginPath();
    ctx.fillStyle = gradient;
    ctx.arc(center.x, center.y, 120 + pulse, 0, Math.PI * 2);
    ctx.fill();
}

function animate() {
    requestAnimationFrame(animate);

    drawBackground();
    drawCore();

    stars.forEach(star => {
        star.update();
        star.draw();
    });

    if (pulse > 0) pulse -= 1.2;
}

animate();
</script>

</body>
</html>
