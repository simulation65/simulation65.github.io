<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Realm</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        let width, height;
        let particles = [];
        let mouse = { x: 0, y: 0, active: false };
        let clicks = [];
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.2;
                this.vy = (Math.random() - 0.5) * 1.2;
                this.size = Math.random() * 3.5 + 1.5;
                this.hue = Math.random() * 60 + 200; // blue to purple
                this.phase = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.8 + 0.4;
            }
            
            update() {
                // Quantum-like movement: base velocity + wave oscillation
                this.phase += 0.08;
                
                const waveX = Math.sin(this.phase) * 0.6;
                const waveY = Math.cos(this.phase * 1.3) * 0.6;
                
                this.vx += waveX * 0.015;
                this.vy += waveY * 0.015;
                
                // Gentle mouse influence
                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 300 && dist > 0) {
                        const force = (300 - dist) / 300;
                        this.vx += (dx / dist) * force * 0.18;
                        this.vy += (dy / dist) * force * 0.18;
                    }
                }
                
                // Damping
                this.vx *= 0.975;
                this.vy *= 0.975;
                
                // Speed limit
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 4) {
                    this.vx = (this.vx / speed) * 4;
                    this.vy = (this.vy / speed) * 4;
                }
                
                this.x += this.vx * this.speed;
                this.y += this.vy * this.speed;
                
                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
                
                // Occasional quantum jump
                if (Math.random() < 0.003) {
                    this.vx += (Math.random() - 0.5) * 6;
                    this.vy += (Math.random() - 0.5) * 6;
                }
            }
            
            draw() {
                const pulse = Math.sin(this.phase * 3) * 0.5 + 1;
                const alpha = 0.6 + Math.sin(this.phase) * 0.4;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // Glow
                ctx.shadowBlur = 18;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 75%)`;
                
                ctx.fillStyle = `hsl(${this.hue}, 100%, 85%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * pulse, 0, Math.PI * 2);
                ctx.fill();
                
                // Core
                ctx.shadowBlur = 4;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.45, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function createParticles(count) {
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }
        
        function drawConnections() {
            ctx.save();
            ctx.strokeStyle = 'rgba(140, 180, 255, 0.12)';
            ctx.lineWidth = 1.2;
            
            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                
                for (let j = i + 1; j < particles.length; j += 2) { // skip some for performance
                    const p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distSq = dx * dx + dy * dy;
                    
                    if (distSq < 160 * 160 && distSq > 4) {
                        const alpha = (1 - Math.sqrt(distSq) / 160) * 0.18;
                        ctx.globalAlpha = alpha;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            ctx.restore();
        }
        
        function drawClickEffects() {
            for (let i = clicks.length - 1; i >= 0; i--) {
                const c = clicks[i];
                const progress = c.life / c.maxLife;
                
                // Expanding wave ring
                ctx.save();
                ctx.globalAlpha = (1 - progress) * 0.6;
                ctx.strokeStyle = `hsl(260, 90%, 85%)`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // Inner energy burst
                ctx.globalAlpha = (1 - progress) * 0.3;
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius * 0.6, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                
                c.radius += 6.5;
                c.life--;
                
                if (c.life <= 0) {
                    clicks.splice(i, 1);
                }
            }
        }
        
        function animate() {
            // Soft trail effect
            ctx.fillStyle = 'rgba(3, 3, 12, 0.65)';
            ctx.fillRect(0, 0, width, height);
            
            // Update particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
            }
            
            // Draw connections
            drawConnections();
            
            // Draw particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].draw();
            }
            
            // Click effects
            drawClickEffects();
            
            requestAnimationFrame(animate);
        }
        
        function init() {
            resize();
            createParticles(280); // Balanced for performance
            
            // Mouse tracking
            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                mouse.active = true;
            });
            
            window.addEventListener('mouseleave', () => {
                mouse.active = false;
            });
            
            // Click reaction - quantum disturbance
            window.addEventListener('click', (e) => {
                clicks.push({
                    x: e.clientX,
                    y: e.clientY,
                    radius: 10,
                    life: 45,
                    maxLife: 45
                });
                
                // Push nearby particles
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    const dx = p.x - e.clientX;
                    const dy = p.y - e.clientY;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist < 220 && dist > 0) {
                        const force = (220 - dist) / 220 * 8;
                        p.vx += (dx / dist) * force;
                        p.vy += (dy / dist) * force;
                        // Color shift on disturbance
                        p.hue = (p.hue + 40) % 360;
                    }
                }
            });
            
            // Handle resize
            window.addEventListener('resize', () => {
                resize();
                // Reposition particles on resize
                for (let i = 0; i < particles.length; i++) {
                    if (particles[i].x > width) particles[i].x = width * Math.random();
                    if (particles[i].y > height) particles[i].y = height * Math.random();
                }
            });
            
            animate();
        }
        
        window.onload = init;
    </script>
</body>
</html>
