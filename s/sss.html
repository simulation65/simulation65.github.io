<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⁑</title>

<style>
    html, body {
        margin: 0;
        overflow: hidden;
        background: black;
        height: 100%;
    }

    canvas {
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        display: block;
    }

    #overlay {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.4);
        font-family: monospace;
        font-size: 14px;
        letter-spacing: 2px;
        pointer-events: none;
        text-shadow: 0 0 4px black;
    }
</style>
</head>
<body>

<div id="overlay">⁂</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const scale = 4;

function resize() {
    canvas.width = innerWidth / scale;
    canvas.height = innerHeight / scale;
}
resize();
addEventListener("resize", resize);

let flicker = 0;

function draw() {
    const w = canvas.width;
    const h = canvas.height;

    // Background
    ctx.fillStyle = "#2b2b2b";
    ctx.fillRect(0, 0, w, h);

    // Ceiling
    ctx.fillStyle = "#3a3a3a";
    ctx.fillRect(0, 0, w, h * 0.35);

    // Floor
    ctx.fillStyle = "#4f4a44";
    ctx.fillRect(0, h * 0.35, w, h);

    // Perspective hallway
    const center = w / 2;

    for (let i = 0; i < 12; i++) {
        const y = h * 0.35 + i * 12;

        ctx.strokeStyle = `rgb(${70+i*5},${70+i*5},${70+i*5})`;
        ctx.beginPath();
        ctx.moveTo(center - 20 - i * 8, y);
        ctx.lineTo(center + 20 + i * 8, y);
        ctx.stroke();
    }

    // Walls
    ctx.fillStyle = "#6a645c";

    ctx.beginPath();
    ctx.moveTo(0, h);
    ctx.lineTo(center - 30, h * 0.35);
    ctx.lineTo(center - 5, h * 0.35);
    ctx.lineTo(center - 70, h);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(w, h);
    ctx.lineTo(center + 30, h * 0.35);
    ctx.lineTo(center + 5, h * 0.35);
    ctx.lineTo(center + 70, h);
    ctx.fill();

    // Ceiling lights
    for (let i = 0; i < 5; i++) {
        const size = 10 - i;
        const y = 18 + i * 18;

        ctx.fillStyle = `rgba(255,255,210,${0.7 - i*0.1})`;
        ctx.fillRect(center - size, y, size * 2, 2);
    }

    // Random flicker
    flicker += Math.random() * 0.4;

    if (Math.sin(flicker) > 0.85) {
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(0, 0, w, h);
    }

    // Noise
    for (let i = 0; i < 250; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.03})`;
        ctx.fillRect(
            Math.random() * w,
            Math.random() * h,
            1,
            1
        );
    }

    // VHS scanlines
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    for (let y = 0; y < h; y += 2) {
        ctx.fillRect(0, y, w, 1);
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
